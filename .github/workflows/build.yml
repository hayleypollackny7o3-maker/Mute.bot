name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev
        pip install buildozer cython

    - name: Download and install Android Build-Tools manually
      run: |
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/build-tools/37.0.0
        cd /home/runner/.buildozer/android/platform/android-sdk/build-tools/37.0.0
        wget -q https://dl.google.com/android/repository/build-tools_r37-linux.zip
        unzip -q build-tools_r37-linux.zip
        rm build-tools_r37-linux.zip

    - name: Accept Android SDK licenses (just in case)
      run: |
        mkdir -p /home/runner/.android
        echo "### User Sources for Android SDK Manager" > /home/runner/.android/repositories.cfg
        yes | /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Build APK
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: mute-bot-apk
        path: bin/*.apk
